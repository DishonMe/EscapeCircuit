<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Circuit board grid pattern -->
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Horizontal lines -->
  <line x1="40" y1="50" x2="160" y2="50" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <line x1="40" y1="100" x2="160" y2="100" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <line x1="40" y1="150" x2="160" y2="150" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  
  <!-- Vertical lines -->
  <line x1="50" y1="40" x2="50" y2="160" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="40" x2="100" y2="160" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="40" x2="150" y2="160" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  
  <!-- Connection nodes (circles at intersections) -->
  <circle cx="50" cy="50" r="4" fill="#3b82f6" opacity="0.8"/>
  <circle cx="100" cy="50" r="4" fill="#3b82f6" opacity="0.8"/>
  <circle cx="150" cy="50" r="4" fill="#3b82f6" opacity="0.8"/>
  
  <circle cx="50" cy="100" r="4" fill="#3b82f6" opacity="0.8"/>
  <circle cx="100" cy="100" r="6" fill="#fbbf24" opacity="1"/>
  <circle cx="150" cy="100" r="4" fill="#3b82f6" opacity="0.8"/>
  
  <circle cx="50" cy="150" r="4" fill="#3b82f6" opacity="0.8"/>
  <circle cx="100" cy="150" r="4" fill="#3b82f6" opacity="0.8"/>
  <circle cx="150" cy="150" r="4" fill="#3b82f6" opacity="0.8"/>
  
  <!-- Wires connecting to center -->
  <path d="M 50 100 L 94 100" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 50 L 100 94" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 150 100 L 106 100" stroke="#a855f7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 150 L 100 106" stroke="#f97316" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Glow effect on center -->
  <circle cx="100" cy="100" r="8" fill="#fbbf24" opacity="0.3"/>
  <circle cx="100" cy="100" r="10" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.2" stroke-dasharray="3,3"/>
</svg>